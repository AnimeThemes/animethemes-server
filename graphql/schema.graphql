"A datetime and timezone string in ISO 8601 format `Y-m-dTH:i:sP`, e.g. `2020-04-20T13:53:12+02:00`."
scalar DateTimeTz @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\DateTimeTz")

"""
Loose type that allows any value. Be careful when passing in large `Int` or `Float` literals,
as they may not be parsed correctly on the server side. Use `String` literals if you are
dealing with really large numbers to be on the safe side.
"""
scalar Mixed @scalar(class: "MLL\\GraphQLScalars\\MixedScalar")

"Represents a response containing a message."
type MessageResponse {
    message: String!
}

type Mutation @guard {
    ToggleLike(
        entry: Int @bind(class: "App\\Models\\Wiki\\Anime\\Theme\\AnimeThemeEntry", column: "entry_id")
        playlist: String @bind(class: "App\\Models\\List\\Playlist", column: "hashid")
    ): Like
    @canModel(ability: "create")
    @validator(class: "App\\GraphQL\\Validators\\User\\ToggleLikeMutationValidator")
    @field(resolver: "App\\GraphQL\\Mutations\\User\\ToggleLikeMutation")

    "Mark a video as watched."
    Watch(
        entryId: Int!
        videoId: Int!
    ): WatchHistory
    @canModel(ability: "create")
    @validator(class: "App\\GraphQL\\Validators\\User\\WatchMutationValidator")
    @field(resolver: "App\\GraphQL\\Mutations\\User\\WatchMutation")
}

"Indicates what fields are available at the top level of a query operation."
type Query {
    "Returns a listing of resources that match a given search term."
    search(
        search: String!
        first: Int
        page: Int
    ): Search! @field(resolver: "App\\GraphQL\\Queries\\SearchQuery")

    "Returns the first featured theme where the current date is between start_at and end_at dates."
    currentfeaturedtheme: FeaturedTheme @scope(name: "current") @first(model: "App\\Models\\Admin\\FeaturedTheme")

    "Returns the data of the currently authenticated user."
    me: Me @auth

    "Returns a page resource."
    page(slug: String! @eq): Page @find(model: "App\\Models\\Document\\Page")

    "Returns a playlist resource."
    playlist(id: String! @eq(key: "hashid")): Playlist @find(model: "App\\Models\\List\\Playlist")

    "Returns a playlist track resource."
    playlisttrack(
        id: String! @eq(key: "hashid")
        playlist: String!
    ): PlaylistTrack @builder(method: "App\\GraphQL\\Builders\\List\\PlaylistTrackBuilder") @find(model: "App\\Models\\List\\Playlist\\PlaylistTrack")

    "Returns an anime resource."
    anime(slug: String! @eq): Anime @find(model: "App\\Models\\Wiki\\Anime")

    "Returns an artist resource."
    artist(slug: String! @eq): Artist @find(model: "App\\Models\\Wiki\\Artist")

    "Returns a series resource."
    series(slug: String! @eq): Series @find(model: "App\\Models\\Wiki\\Series")

    "Returns a studio resource."
    studio(slug: String! @eq): Studio @find(model: "App\\Models\\Wiki\\Studio")

    "Returns a video resource."
    video(id: String! @eq(key: "video_id")): Video @find(model: "App\\Models\\Wiki\\Video")

    "Filter anime by its external id on given site."
    findAnimeByExternalSite(
        site: ResourceSite!
        id: [Int!]
        link: String
    ): [Anime!]! @builder(method: "App\\GraphQL\\Builders\\FindAnimeByExternalSiteBuilder") @all

    "Shuffle themes."
    animethemeShuffle(
        type: ThemeType
        format: AnimeFormat
        year_lte: Int
        year_gte: Int
        spoiler: Boolean
        first: Int
        page: Int
