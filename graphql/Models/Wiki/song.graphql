"""
Represents the composition that accompanies an AnimeTheme.

For example, Staple Stable is the song for the Bakemonogatari OP1 AnimeTheme.
"""
type Song @model(class: "App\\Models\\Wiki\\Song") {
    "The primary key of the resource"
    id: Int! @rename(attribute: "song_id")

    "The name of the composition"
    title: String

    "The native name of the composition"
    titleNative: String @rename(attribute: "title_native")

    "The date that the resource was created"
    createdAt(format: String! = "Y-m-d H:i:s"): String @timestamp(attribute: "created_at")

    "The date that the resource was updated"
    updatedAt(format: String! = "Y-m-d H:i:s"): String @timestamp(attribute: "updated_at")

    animethemes(
        type: ThemeType @eq
        type_in: [ThemeType!] @in(key: "type")
        sequence: Int @eq
        sequence_lesser: Int @where(operator: "<", key: "sequence")
        sequence_greater: Int @where(operator: ">", key: "sequence")
        sort: [AnimeThemeSort!] @builder(method: "App\\GraphQL\\Builders\\SortBuilder")
    ): [AnimeTheme!]! @hasMany

    performances(
        sort: [PerformanceSort!] @builder(method: "App\\GraphQL\\Builders\\SortBuilder")
    ): [Performance!]! @hasMany

    resources(
        site: ResourceSite @eq
        externalId: Int @eq(key: "external_id")
        sort: [ExternalResourceSort!] @builder(method: "App\\GraphQL\\Builders\\SortBuilder")
    ): [ExternalResource!]! @belongsToManyCustom(type: CONNECTION, edgeType: "ExternalResourceEdge")
}

extend type Query {
    "Returns a listing of song resources given fields."
    songPagination(
        id: Int @eq(key: "song_id")
        title: String @eq
        titleNative: String @eq(key: "title_native")
        createdAt_lesser: String @where(operator: "<", key: "created_at")
        createdAt_greater: String @where(operator: ">", key: "created_at")
        updatedAt_lesser: String @where(operator: "<", key: "updated_at")
        updatedAt_greater: String @where(operator: ">", key: "updated_at")
        sort: [SongSort!] @builder(method: "App\\GraphQL\\Builders\\SortBuilder")
    ): [Song!]! @paginate
}