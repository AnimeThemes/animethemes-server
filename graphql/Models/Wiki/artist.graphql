"""
Represents a musical performer of anime sequences.

For example, Chiwa Saitou is the musical performer of the Bakemonogatari OP1 theme, among many others.
"""
type Artist @model(class: "App\\Models\\Wiki\\Artist") {
    "The primary key of the resource"
    id: Int! @rename(attribute: "artist_id")

    "The primary title of the artist"
    name: String!

    "The URL slug & route key of the resource"
    slug: String!

    "The brief information of the resource"
    information: String

    "The date that the resource was created"
    createdAt(format: String! = "Y-m-d H:i:s"): String @timestamp(attribute: "created_at")

    "The date that the resource was updated"
    updatedAt(format: String! = "Y-m-d H:i:s"): String @timestamp(attribute: "updated_at")

    synonyms(
        type: SynonymType @eq
        sort: [SynonymSort!] @sort
    ): [Synonym!]! @morphMany

    images(
        facet: ImageFacet @eq
        path_like: String @like(key: "path")
        sort: [ImageSort!] @sort
    ): [Image!]! @belongsToManyCustom(type: CONNECTION, edgeType: "ImageEdge")

    resources(
        site: ResourceSite @eq
        externalId: Int @eq(key: "external_id")
        sort: [ExternalResourceSort!] @sort
    ): [ExternalResource!]! @belongsToManyCustom(type: CONNECTION, edgeType: "ExternalResourceEdge")

    performances(
        sort: [PerformanceSort!] @sort
    ): [Performance!]! @hasManyCustom(type: SIMPLE)

    memberPerformances(
        sort: [PerformanceSort!] @sort
    ): [Performance!]! @hasManyCustom(type: SIMPLE)

    members(
        name: String @eq
        name_like: String @like(key: "name")
        createdAt_lesser: String @where(operator: "<", key: "created_at")
        createdAt_greater: String @where(operator: ">", key: "created_at")
        updatedAt_lesser: String @where(operator: "<", key: "updated_at")
        updatedAt_greater: String @where(operator: ">", key: "updated_at")
        sort: [ArtistMemberSort!] @sort
    ): [Artist!]! @belongsToManyCustom(type: CONNECTION, edgeType: "ArtistMemberEdge")

    groups(
        name: String @eq
        name_like: String @like(key: "name")
        createdAt_lesser: String @where(operator: "<", key: "created_at")
        createdAt_greater: String @where(operator: ">", key: "created_at")
        updatedAt_lesser: String @where(operator: "<", key: "updated_at")
        updatedAt_greater: String @where(operator: ">", key: "updated_at")
        sort: [ArtistMemberSort!] @sort
    ): [Artist!]! @belongsToManyCustom(type: CONNECTION, edgeType: "ArtistMemberEdge")
}

type ArtistMemberEdge @model(class: "App\\Pivots\\Wiki\\ArtistMember") {
    "The Artist node."
    node: Artist!

    "Used to distinguish member by alias"
    alias: String

    "Used to distinguish member by character"
    as: String

    "Used to extra annotation, like member role"
    notes: String

    "Used to determine the relevance order of members in group"
    relevance: Int!

    "The date that the resource was created"
    createdAt(format: String! = "Y-m-d H:i:s"): String @timestamp(attribute: "created_at")

    "The date that the resource was updated"
    updatedAt(format: String! = "Y-m-d H:i:s"): String @timestamp(attribute: "updated_at")
}

extend type Query {
    "Returns an artist resource."
    artist(slug: String! @eq): Artist @find(model: "App\\Models\\Wiki\\Artist")

    "Returns a listing of artist resources given fields."
    artistPagination(
        id: Int @eq(key: "artist_id")
        name: String @eq
        name_like: String @like(key: "name")
        search: String @search
        slug: String @eq
        createdAt_lesser: String @where(operator: "<", key: "created_at")
        createdAt_greater: String @where(operator: ">", key: "created_at")
        updatedAt_lesser: String @where(operator: "<", key: "updated_at")
        updatedAt_greater: String @where(operator: ">", key: "updated_at")
        sort: [ArtistSort!] @sort
    ): [Artist!]! @paginate
}